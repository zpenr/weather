{% extends "auth_app/base.html" %}
{% block form %}
    <form action="{% url 'login'%}" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="position-absolute bottom-10 start-50 translate-middle-x">
            <button type="submit" class = "btn btn-outline-light">Зарегестрироваться</button>
        </div>
    </form>
{% endblock %}
